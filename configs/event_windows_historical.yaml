# Historical Stablecoin Stress Event Windows
# Tiered data availability catalogue for StressBench benchmark
# Expanded to 18 events covering 2020-2023
#
# Tiers:
#   A: Execution-grade — full L2, VWAP labels computable
#   B: Price-grade — OHLCV/DEX/trades available, no full L2
#   C: Context-grade — partial data, historical context only
#
# coverage_score: 0.25 (C) / 0.50 (B) / 0.75 (A-partial) / 1.0 (A-full)
# max_depeg_bps_est: estimated peak deviation from $1.00 in basis points; negative = below peg
# duration_class: hours / days / weeks
# verification_status: verified / needs_source

events:

  # ── ALGORITHMIC_REFLEXIVE (5 events) ───────────────────────────────────────

  fei_launch_2021:
    stablecoins: [FEI]
    mechanism_class: algorithmic_reflexive
    mechanism: "FEI/PCV launch stress; Genesis Group oversubscribed; FEI immediately depegged below $1 due to excess supply vs Protocol Controlled Value"
    start: "2021-04-01T00:00:00Z"
    end: "2021-04-10T23:59:59Z"
    data_tier: C
    data_sources:
      - coingecko_ohlcv
      - uniswap_v2_swaps
    empirical_use: "Taxonomy context only; no benchmark tasks"
    coverage_score: 0.25
    max_depeg_bps_est: -2000
    duration_class: days
    verification_status: needs_source
    notes: >
      FEI launched April 1 2021; Genesis minted ~1.3B FEI. Peg defense via Uniswap
      incentive mechanism failed initially. FEI traded well below $1 (est. up to -2000 bps)
      for approximately 1-2 weeks. No CEX L2 depth available. Exact magnitude unconfirmed
      from primary sources; use with "est." notation only.

  iron_titan_2021:
    stablecoins: [IRON]
    mechanism_class: algorithmic_reflexive
    mechanism: "Algorithmic stablecoin bank run; TITAN governance token collapse; IRON redeemability failed"
    start: "2021-06-16T00:00:00Z"
    end: "2021-06-17T23:59:59Z"
    data_tier: C
    data_sources:
      - coingecko_ohlcv
      - polygon_dex_swaps
    empirical_use: "Taxonomy context only; no benchmark tasks"
    coverage_score: 0.25
    max_depeg_bps_est: -10000
    duration_class: hours
    verification_status: needs_source
    notes: >
      IRON was traded exclusively on QuickSwap (Polygon DEX). No CEX L2 depth available.
      Benchmark venues (Binance/Coinbase/Kraken) had minimal exposure.
      Terminal depeg: IRON to $0, TITAN to $0 in <24 hours.
      max_depeg_bps_est is terminal (death spiral); intermediate depeg levels not confirmed.

  mim_wonderland_2022:
    stablecoins: [MIM]
    mechanism_class: algorithmic_reflexive
    mechanism: "MIM/Wonderland confidence shock; Sifu (Wonderland treasury manager) pseudonymous identity revealed; TIME/wMEMO collateral pressure"
    start: "2022-01-27T00:00:00Z"
    end: "2022-02-03T23:59:59Z"
    data_tier: C
    data_sources:
      - coingecko_ohlcv
      - curve_mim_3pool_reserves
      - abracadabra_onchain
    empirical_use: "Taxonomy context only; no benchmark tasks"
    coverage_score: 0.25
    max_depeg_bps_est: -300
    duration_class: days
    verification_status: needs_source
    notes: >
      MIM peaked at approximately -300 bps (est.) during the Sifu identity revelation.
      Curve MIM-3pool became imbalanced. Exact magnitude from reputable sources not confirmed;
      figure is an estimate from secondary market commentary.

  terra_ust_2022:
    stablecoins: [UST, USDT, DAI]
    mechanism_class: algorithmic_reflexive
    mechanism: "Algorithmic stablecoin death spiral; LUNA mint/burn mechanism failure; Anchor Protocol run"
    start: "2022-05-07T00:00:00Z"
    end: "2022-05-14T23:59:59Z"
    data_tier: B
    data_sources:
      - binance_ohlcv
      - coinbase_ohlcv
      - kraken_ohlcv
      - curve_pool_reserves
      - terra_onchain_transactions
    empirical_use: "Validation split illustrative; price-basis claims only"
    coverage_score: 0.50
    max_depeg_bps_est: -10000
    duration_class: weeks
    verification_status: verified
    notes: >
      UST terminal depeg (-98%); widely documented in academic and news sources.
      USDT brief stress (<15 bps), USDC minimal (<10 bps).
      Contagion to USDC/USDT too brief for label construction.
      Curve 3pool imbalance was a 12h leading indicator (documented in Cintra & Holloway 2023).
      Maps to terra_luna_2022 window in event_windows.yaml (split=validation).

  usdd_tron_2022:
    stablecoins: [USDD]
    mechanism_class: algorithmic_reflexive
    mechanism: "USDD/TRON algorithmic stress; USDD reserves questioned; partial depegging following UST contagion sentiment"
    start: "2022-06-13T00:00:00Z"
    end: "2022-06-20T23:59:59Z"
    data_tier: B
    data_sources:
      - coingecko_ohlcv
      - huobi_ohlcv
      - poloniex_ohlcv
    empirical_use: "Taxonomy context only; not in benchmark splits"
    coverage_score: 0.50
    max_depeg_bps_est: -200
    duration_class: days
    verification_status: needs_source
    notes: >
      USDD launched May 2022; amid broader algorithmic stablecoin panic post-UST,
      USDD briefly traded below peg (est. -200 bps). TRX reserve backing mechanism
      maintained peg recovery. Exact magnitude not confirmed from primary source.

  # ── EXCHANGE_CREDIT_LIQUIDITY (3 events) ────────────────────────────────────

  celsius_3ac_2022:
    stablecoins: [USDT, USDC, stETH]
    mechanism_class: exchange_credit_liquidity
    mechanism: "Celsius Network withdrawal freeze and Three Arrows Capital insolvency; contagion through shared DeFi collateral pools"
    start: "2022-06-10T00:00:00Z"
    end: "2022-06-25T23:59:59Z"
    data_tier: B
    data_sources:
      - binance_ohlcv
      - coinbase_ohlcv
      - curve_steth_pool_reserves
      - onchain_celsius_outflows
    empirical_use: "Taxonomy context only; liquidity contagion illustration"
    coverage_score: 0.50
    max_depeg_bps_est: -100
    duration_class: weeks
    verification_status: needs_source
    notes: >
      Celsius froze withdrawals Jun 12 2022; 3AC insolvency announced ~Jun 17.
      stETH/ETH peg stressed; USDT and USDC saw modest basis widening (est. ~100 bps max).
      Primary stress was in DeFi collateral; CEX stablecoin impact was indirect.
      Exact stablecoin depeg magnitude not confirmed from primary source.

  husd_depeg_2022:
    stablecoins: [HUSD]
    mechanism_class: exchange_credit_liquidity
    mechanism: "HUSD issuer liquidity failure; Stable Universal (HUSD issuer) lost Huobi backing; HUSD redemptions suspended"
    start: "2022-08-18T00:00:00Z"
    end: "2022-08-25T23:59:59Z"
    data_tier: B
    data_sources:
      - coingecko_ohlcv
      - huobi_ohlcv
      - huobi_partial_orderbook
    empirical_use: "Taxonomy context only; not in benchmark splits"
    coverage_score: 0.50
    max_depeg_bps_est: -800
    duration_class: days
    verification_status: needs_source
    notes: >
      HUSD dropped to approximately $0.92 (est. -800 bps) during the liquidity failure.
      Huobi Global later clarified operational restructuring; partial recovery followed.
      Not a benchmark venue stablecoin; included for mechanism diversity.
      Exact depeg from reputable primary source not confirmed.

  ftx_collapse_2022:
    stablecoins: [USDT, USDC, DAI]
    mechanism_class: exchange_credit_liquidity
    mechanism: "FTX exchange collapse; balance sheet fraud revealed; withdrawal halt and Chapter 11 filing"
    start: "2022-11-06T00:00:00Z"
    end: "2022-11-12T23:59:59Z"
    data_tier: B
    data_sources:
      - binance_ohlcv
      - coinbase_ohlcv
      - kraken_ohlcv
      - binance_partial_orderbook
      - usdt_onchain_movements
    empirical_use: "Illustrative exchange-specific credit shock; not in benchmark splits"
    coverage_score: 0.50
    max_depeg_bps_est: -50
    duration_class: days
    verification_status: verified
    notes: >
      USDT peak approximately -20 bps (Kraken); USDC -5 bps. Verified by contemporaneous
      exchange data and widely reported. max_depeg_bps_est set conservatively at -50 bps
      to cover cross-venue variation. Stress was exchange-specific (FTX); benchmark venues
      show small contagion. No full L2 tape in benchmark dataset for this period.
      Demonstrates exchange credit shocks produce smaller dislocations than reserve shocks.

  # ── REGULATORY_ISSUER_WINDDOWN (2 events) ────────────────────────────────────

  busd_regulatory_2023:
    stablecoins: [BUSD, USDC, USDT]
    mechanism_class: regulatory_issuer_winddown
    mechanism: "NYDFS orders Paxos to halt BUSD minting; SEC Wells notice; Binance auto-conversion program"
    start: "2023-02-13T00:00:00Z"
    end: "2023-03-08T23:59:59Z"
    data_tier: B
    data_sources:
      - binance_ohlcv
      - binance_partial_orderbook
      - paxos_attestation_reports
    empirical_use: "Illustrative regulatory winddown dynamics; not in primary benchmark splits"
    coverage_score: 0.50
    max_depeg_bps_est: -30
    duration_class: weeks
    verification_status: verified
    notes: >
      BUSD peak approximately -30 bps during conversion rush; NYDFS order dated Feb 13 2023.
      USDC/USDT +10 bps appreciation as conversion destination.
      Occurred 3 weeks before SVB event; may explain elevated Q1 2023 basis volatility.
      BUSD not a primary benchmark asset. Full L2 tape available via Binance archive
      but not integrated into benchmark dataset.

  binance_stablecoin_conversion_2022:
    stablecoins: [BUSD, USDC, TUSD]
    mechanism_class: regulatory_issuer_winddown
    mechanism: "Binance auto-converts USDC, USDP, and TUSD balances to BUSD; reduces multi-stablecoin fragmentation on Binance"
    start: "2022-09-01T00:00:00Z"
    end: "2022-09-30T23:59:59Z"
    data_tier: C
    data_sources:
      - binance_ohlcv
      - binance_announcements
    empirical_use: "Context only; operational/policy event, not a stress event"
    coverage_score: 0.25
    max_depeg_bps_est: 0
    duration_class: weeks
    verification_status: needs_source
    notes: >
      Binance announced auto-conversion of USDC, USDP, TUSD to BUSD effective Sept 29 2022.
      This was an exchange policy decision, not a depeg event; max_depeg_bps_est=0 because
      conversions happened at par. Included as context for understanding Binance stablecoin
      market structure in the study period. Exact conversion dates from primary source not confirmed.

  # ── FIAT_RESERVE_BANK_SHOCK (2 events) ──────────────────────────────────────

  usdc_svb_2023:
    stablecoins: [USDC, DAI, USDT]
    mechanism_class: fiat_reserve_bank_shock
    mechanism: "Reserve bank insolvency; SVB seized by FDIC; Circle held ~$3.3B (~8% of reserves) at SVB"
    start: "2023-03-10T00:00:00Z"
    end: "2023-03-14T23:59:59Z"
    data_tier: A
    data_sources:
      - binance_real_l2_snapshot
      - coinbase_real_l2_snapshot
      - kraken_real_l2_snapshot
      - binance_trade_tape
      - coinbase_trade_tape
      - kraken_trade_tape
      - usdc_onchain_redemptions
    empirical_use: "PRIMARY benchmark test split; all paper claims anchored here"
    coverage_score: 1.0
    max_depeg_bps_est: -1300
    duration_class: days
    verification_status: verified
    notes: >
      USDC peak -1300 bps (~$0.87). DAI -200 bps (USDC-backed collateral). USDT +50 bps premium.
      Real L2 depth captured during event for all benchmark venues.
      Full net_profit_bps labels computable at all notional sizes.
      Oracle earns 161-225 net bps/trade; all models produce negative net bps.
      12x price-to-execution gap: 35% price-basis positive vs 2.88% executable at $10K.
      Maps to usdc_depeg_2023 in event_windows.yaml (split=test).

  usdc_svb_recovery_2023:
    stablecoins: [USDC, DAI, USDT]
    mechanism_class: fiat_reserve_bank_shock
    mechanism: "Post-SVB recovery; US Treasury+Fed+FDIC joint statement guaranteed full SVB deposits"
    start: "2023-03-15T00:00:00Z"
    end: "2023-04-01T23:59:59Z"
    data_tier: A
    data_sources:
      - binance_real_l2_snapshot
      - coinbase_real_l2_snapshot
      - kraken_real_l2_snapshot
      - binance_trade_tape
      - coinbase_trade_tape
    empirical_use: "Test split recovery window; validates regime generalization"
    coverage_score: 0.75
    max_depeg_bps_est: -10
    duration_class: weeks
    verification_status: verified
    notes: >
      USDC fully restored to $1.000 by Mar 15 following FDIC deposit guarantee statement.
      Recovery window has very few executable arbitrage windows (label density near zero).
      Important for validating model false-positive rate drops post-recovery.
      On-chain recovery metrics (attestations, redemption volumes) not fully integrated.
      Maps to usdc_depeg_2023_recovery in event_windows.yaml (split=test boundary).

  # ── DEFI_POOL_IMBALANCE (3 events) ──────────────────────────────────────────

  curve_3pool_ust_2022:
    stablecoins: [UST, USDC, USDT, DAI]
    mechanism_class: defi_pool_imbalance
    mechanism: "Curve 3pool imbalance during UST collapse; large UST→3CRV swaps distorted USDC/USDT/DAI pool weights"
    start: "2022-05-07T00:00:00Z"
    end: "2022-05-14T23:59:59Z"
    data_tier: B
    data_sources:
      - curve_pool_reserves
      - subgraph_curve_swaps
      - coingecko_ohlcv
    empirical_use: "DeFi contagion mechanism illustration; co-incident with terra_ust_2022"
    coverage_score: 0.50
    max_depeg_bps_est: -500
    duration_class: days
    verification_status: needs_source
    notes: >
      Curve 3pool became highly imbalanced as UST holders exited into 3CRV.
      USDC/USDT/DAI briefly traded at discount within pool (est. -500 bps pool-internal).
      CEX prices showed smaller dislocations. On-chain Curve data available via subgraph
      but not integrated into benchmark dataset. Exact CEX-side magnitude not confirmed.

  usdt_curve_2023:
    stablecoins: [USDT, USDC, DAI]
    mechanism_class: defi_pool_imbalance
    mechanism: "Curve pool imbalance; Tether reserve concerns re-emerge; brief USDT discount"
    start: "2023-06-12T00:00:00Z"
    end: "2023-06-15T23:59:59Z"
    data_tier: B
    data_sources:
      - binance_ohlcv
      - coinbase_ohlcv
      - curve_pool_reserves
      - usdt_onchain_transfers
    empirical_use: "Out-of-sample illustrative; motivates on-chain Curve data integration"
    coverage_score: 0.50
    max_depeg_bps_est: -80
    duration_class: days
    verification_status: verified
    notes: >
      USDT peak -8 bps on Binance; Curve 3pool USDT imbalance reached ~60% share.
      Very short duration (hours to days). Below benchmark test split window;
      insufficient label density at $10K notional. Curve pool data available but not
      integrated into benchmark dataset. max_depeg_bps_est conservatively -80 bps
      covering cross-venue and pool-internal variation.

  usdc_dai_secondary_svb_2023:
    stablecoins: [USDC, DAI, FRAX]
    mechanism_class: defi_pool_imbalance
    mechanism: "USDC/DAI secondary DeFi stress during SVB; MakerDAO emergency PSM parameters; FRAX partial reserve concern"
    start: "2023-03-10T00:00:00Z"
    end: "2023-03-15T23:59:59Z"
    data_tier: B
    data_sources:
      - curve_pool_reserves
      - makerdao_psm_data
      - coingecko_ohlcv
    empirical_use: "DeFi contagion illustration co-incident with usdc_svb_2023; not separately benchmarked"
    coverage_score: 0.75
    max_depeg_bps_est: -200
    duration_class: days
    verification_status: needs_source
    notes: >
      DAI depegged to approximately -200 bps (est.) due to USDC-backed PSM collateral.
      MakerDAO emergency governance raised PSM fees. FRAX also had partial USDC backing.
      Overlapping window with usdc_svb_2023 (Tier A); do not double-count for benchmark tasks.
      DeFi pool stress amplified CEX-side pressure. Exact DAI minimum not confirmed from
      primary MakerDAO governance logs.

  # ── COLLATERAL_LIQUIDATION_ORACLE (1 event) ─────────────────────────────────

  dai_black_thursday_2020:
    stablecoins: [DAI, ETH]
    mechanism_class: collateral_liquidation_oracle
    mechanism: "DAI Black Thursday; ETH price crash caused undercollateralized vaults; Maker liquidation auctions cleared at near-zero bid; DAI briefly ABOVE peg"
    start: "2020-03-12T00:00:00Z"
    end: "2020-03-14T23:59:59Z"
    data_tier: B
    data_sources:
      - coinbase_ohlcv
      - makerdao_vault_data
      - ethereum_onchain_liquidations
    empirical_use: "Taxonomy context only; collateral-side stress illustration"
    coverage_score: 0.50
    max_depeg_bps_est: 150
    duration_class: days
    verification_status: verified
    notes: >
      DAI traded ABOVE peg during Black Thursday — premium reflects demand to cover
      undercollateralized CDP positions. max_depeg_bps_est is +150 bps (above peg),
      not a discount. ETH dropped ~50% on Mar 12; ~4.5M DAI zero-bid auctions executed.
      MakerDAO governance declared emergency; MKR dilution used to recapitalize.
      Widely documented in MakerDAO post-mortems and academic literature.

  # ── RWA_NICHE_STABLECOIN (2 events) ─────────────────────────────────────────

  acala_ausd_2022:
    stablecoins: [aUSD]
    mechanism_class: rwa_niche_stablecoin
    mechanism: "aUSD Acala minting exploit; misconfigured liquidity pool allowed unbacked aUSD minting; 1.28B aUSD illegitimately minted"
    start: "2022-08-14T00:00:00Z"
    end: "2022-08-21T23:59:59Z"
    data_tier: C
    data_sources:
      - acala_onchain_data
      - coingecko_ohlcv
    empirical_use: "Taxonomy context only; exploit/hack mechanism"
    coverage_score: 0.25
    max_depeg_bps_est: -9900
    duration_class: days
    verification_status: needs_source
    notes: >
      1.28 billion aUSD erroneously minted via misconfigured iBTC/aUSD liquidity pool.
      Acala network placed in maintenance mode; on-chain transactions halted.
      aUSD dropped to near $0 on secondary markets (est. -9900 bps).
      Most minted aUSD was identified and burned in governance process.
      Not a benchmark venue asset. Exact minimum price not confirmed from primary chain data.

  usdr_2023:
    stablecoins: [USDR]
    mechanism_class: rwa_niche_stablecoin
    mechanism: "USDR real-estate-backed stablecoin redemption failure; Tangible Protocol DAI reserve depleted; real-estate collateral illiquid"
    start: "2023-10-11T00:00:00Z"
    end: "2023-10-18T23:59:59Z"
    data_tier: B
    data_sources:
      - coingecko_ohlcv
      - tangible_protocol_onchain
      - polygon_dex_swaps
    empirical_use: "Taxonomy context only; real-world-asset backing stress illustration"
    coverage_score: 0.50
    max_depeg_bps_est: -5000
    duration_class: days
    verification_status: needs_source
    notes: >
      USDR depegged to approximately $0.50 (est. -5000 bps) when DAI reserves were depleted
      by redemption requests. Real estate tokenization backing could not be liquidated quickly.
      Not traded on benchmark CEX venues. Event illustrates RWA illiquidity risk for
      asset-backed stablecoins. Exact trough price not confirmed from primary on-chain data.
